<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Mobile Store</title>
    <style>
        /* Modern Theme Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white; line-height: 1.6;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        nav { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); color: white; padding: 1rem; display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; transition: 0.3s; cursor: pointer; opacity: 0.8; }
        nav a:hover { color: #00d2ff; opacity: 1; }

        .section { display: none; padding: 40px 20px; text-align: center; max-width: 1200px; margin: auto; min-height: 80vh; }
        .active { display: block; }

        /* Products Grid Styling */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .card:hover { 
            transform: translateY(-10px); 
            background: rgba(255, 255, 255, 0.1);
            border-color: #00d2ff;
        }

        .card img { width: 100%; height: 220px; object-fit: contain; border-radius: 12px; margin-bottom: 15px; }
        .card h3 { font-size: 1.4rem; margin-bottom: 10px; }
        .card p { color: #00d2ff; font-weight: bold; font-size: 1.3rem; margin-bottom: 15px; }

        .buy-btn { 
            background: linear-gradient(90deg, #00d2ff, #3a7bd5); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        .buy-btn:hover { box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        
        a { text-decoration: none; }

        /* Forms Styling */
        .form-container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: inline-block; min-width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; outline: none; background: rgba(255, 255, 255, 0.9); }
        .submit-btn { width: 100%; padding: 12px; background: #00d2ff; color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a onclick="showSection('home')">Home</a>
    <a onclick="showSection('about')" >About</a>
    <a onclick="showSection('login')">Login</a>
    <a onclick="showSection('register')" >Register</a>
</nav>

<div id="home" class="section active">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Elite Mobile Store 📱</h1>
    <p style="opacity: 0.7; margin-bottom: 30px;">Premium Smartphones, Delivered to Your Door</p>
    
    <div class="products-grid">
    
        <div class="card">
            <img src="iphone 15 pro.jpg" alt="iPhone 15">
            <h3>iPhone 15 Pro Max</h3>
            <p>$1,199</p>
            <a href="baynow.html"><button class="buy-btn">Buy Now 🛒</button></a>
        </div>

        
        <div class="card">
            <img src="sumsong s24.jpg" alt="Samsung S24">
            <h3>Samsung S24 Ultra</h3>
            <p>$1,050</p>
            <a href="baynow.html"><button class="buy-btn">Buy Now 🛒</button></a>
        </div>

        
        <div class="card">
            <img src="pixel 8 pro.jpg" alt="Google Pixel 8">
            <h3>Google Pixel 8 Pro</h3>
            <p>$899</p>
            <a href="baynow.html"><button class="buy-btn">Buy Now 🛒</button></a>
        </div>

        
        <div class="card">
            <img src="iphone 15 pro.jpg" alt="iPhone 15">
            <h3>iPhone 14 Pro</h3>
            <p>$950</p>
            <a href="baynow.html"><button class="buy-btn">Buy Now 🛒</button></a>
        </div>

        <div class="card">
            <img src="iphone 15 pro.jpg" alt="iPhone 15">
            <h3>iPhone 13 Pro</h3>
            <p>$750</p>
            <a href="baynow.html"><button class="buy-btn">Buy Now 🛒</button></a>
        </div>

        <div class="card">
            <img src="iphone 15 pro.jpg" alt="iPhone 15">
            <h3>iPhone 15 Plus</h3>
            <p>$899</p>
            <a href="baynow.html"><button class="buy-btn">Buy Now 🛒</button></a>
        </div>
    </div>
</div>


<script>
    function showSection(sectionId) {
        const sections = document.querySelectorAll('.section');
        sections.forEach(sec => sec.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
    }
</script>

</body>
</html>
